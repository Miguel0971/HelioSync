<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Heliosync</title>
    <link href="../style/cadastroStyle.css" rel="stylesheet" />
    <link href="../style/lotusStyle.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="../util/heliosync.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="main-container">
        <div class="left-side">
            <div class="lotus-container">
                <div class="lotus-glow"></div>
                <div class="lotus" id="lotus">
                    <div class="petal-wrapper">
                        <div class="petal"></div>
                    </div>
                    <div class="petal-wrapper">
                        <div class="petal"></div>
                    </div>
                    <div class="petal-wrapper">
                        <div class="petal"></div>
                    </div>
                    <div class="petal-wrapper">
                        <div class="petal"></div>
                    </div>
                    <div class="petal-wrapper">
                        <div class="petal"></div>
                    </div>
                    <div class="petal-wrapper">
                        <div class="petal"></div>
                    </div>
                    <div class="petal-wrapper">
                        <div class="petal"></div>
                    </div>
                    <div class="petal-wrapper">
                        <div class="petal"></div>
                    </div>
                    <div class="lotus-center"></div>
                </div>
                <div class="progress-indicator" id="progressText">Bem-vindo ao Heliosync</div>
            </div>
        </div>

        <div class="right-side">
            <div class="cadastro-container">
                <div class="header-cadastro">
                    <img src="../util/heliosync.jpg" alt="Heliosync">
                    <h2>Criar Conta</h2>
                    <p>Junte-se à energia do futuro</p>
                </div>

                <form id="cadastroForm" class="form-cadastro">
                    <div class="input-group">
                        <i class="fa fa-user"></i>
                        <input type="text" id="nome" placeholder="Nome completo" maxlength="30" required>
                    </div>

                    <div class="input-group">
                        <i class="fa fa-envelope"></i>
                        <input type="email" id="email" placeholder="E-mail" maxlength="50" required>
                    </div>

                    <div class="input-group">
                        <i class="fa fa-user"></i>
                        <input type="text" id="username" placeholder="Nome de usuário" maxlength="20" required>
                    </div>

                    <div class="input-group">
                        <i class="fa fa-lock"></i>
                        <input type="password" id="password" placeholder="Senha" maxlength="20" required>
                    </div>

                    <div class="input-group">
                        <i class="fa fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirmar senha" maxlength="20"
                            required>
                    </div>

                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="termos" required>
                            <span class="checkmark"></span>
                            <a href="#" class="termos-link">Aceito os termos de uso e política de privacidade</a>
                        </label>
                    </div>

                    <button type="submit" class="btnCriarConta">
                        <i class="fa fa-user-plus"></i>
                        Criar Conta
                    </button>
                </form>

                <div class="login-link">
                    <p>Já tem conta? <a href="mainpage.html">Entrar</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>Heliosync © 2026.1 - UNISO</p>
        <a href="https://www.instagram.com/heliosyncenterprise" class="instagram-footer" target="_blank">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" viewBox="0 0 24 24">
                <path
                    d="M7.75 2C4.57 2 2 4.57 2 7.75v8.5C2 19.43 4.57 22 7.75 22h8.5C19.43 22 22 19.43 22 16.25v-8.5C22 4.57 19.43 2 16.25 2h-8.5zm0 2h8.5C18.22 4 20 5.78 20 7.75v8.5c0 1.97-1.78 3.75-3.75 3.75h-8.5C5.78 20 4 18.22 4 16.25v-8.5C4 5.78 5.78 4 7.75 4zm8.75 1.5a1.25 1.25 0 110 2.5 1.25 1.25 0 010-2.5zM12 7a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6z" />
            </svg>
            Instagram
        </a>
    </footer>

    <script src="../script/cadastroScript.js"></script>
</body>
